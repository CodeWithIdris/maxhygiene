<!DOCTYPE html>
<html>
<head>
    <title>MaxHygiene Quote</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:30px;
        }

        .quote-card{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
        }

        th{
            background:#28a745;
            color:white;
        }

        .total{
            text-align:right;
            font-size:24px;
            font-weight:bold;
            margin-top:20px;
        }

        .actions{
            margin-top:20px;
        }

        button{
            padding:12px 20px;
            border:none;
            cursor:pointer;
            border-radius:6px;
            margin-right:10px;
        }

        .pdf{
            background:#28a745;
            color:white;
        }

        .whatsapp{
            background:#25D366;
            color:white;
        }
    </style>
</head>
<body>

<div class="quote-card">

    <h1>MaxHygiene Quote</h1>

    <div id="customer"></div>

    <table>
        <thead>
            <tr>
                <th>Description</th>
                <th>Qty</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="quoteLines"></tbody>
    </table>

    <div class="total" id="quoteTotal"></div>

    <div class="actions">
        <button class="pdf" onclick="window.print()">
            Save PDF
        </button>

        <button class="whatsapp" onclick="sendWhatsApp()">
            Send WhatsApp
        </button>
    </div>

</div>

<script>

const quote =
JSON.parse(
localStorage.getItem("maxhygieneQuote")
);

if(quote){

    document.getElementById("customer").innerHTML = `
        <h3>${quote.recipientForename || ""} ${quote.recipientSurname || ""}</h3>
        <p>${quote.recipientEmail || ""}</p>
    `;

    let html = "";

    quote.pricingdetailed.forEach(item=>{

        html += `
            <tr>
                <td>${item.Description}</td>
                <td>${item.Quantity}</td>
                <td>${item.Price}</td>
            </tr>
        `;
    });

    document.getElementById("quoteLines").innerHTML = html;

    document.getElementById("quoteTotal").innerHTML =
        `${quote.currency.Id}${quote.pricing.Price}`;
}

function sendWhatsApp(){

    const text =
`MaxHygiene Quote

Total: ${quote.currency.Id}${quote.pricing.Price}`;

    window.open(
        `https://wa.me/?text=${encodeURIComponent(text)}`,
        "_blank"
    );
}

</script>

</body>
</html>
